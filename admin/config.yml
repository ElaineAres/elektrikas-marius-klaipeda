backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "content/home.json"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string", required: false }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string", required: false }
          - { label: "Hero Description", name: "heroDescription", widget: "text", required: false }
          - { label: "Hero Button Text", name: "heroButtonText", widget: "string", required: false }
